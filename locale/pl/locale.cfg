zinc-pump=Ocynkowany fragment rury. Nie zamarza na zimnych powierzchniach.
solar-matrix=Bardziej zaawansowany i wydajny panel słoneczny. Ogniwa słoneczne są nasączone [fluid=nitrogen]. Nadal jest bezużyteczny na [planet=paracelsin] z powodu braku silnego światła słonecznego
