[tips-and-tricks-item-name]
paracelsin-briefing=Odprawa dotycząca Paracelsin
fulgoran-log=Dziennik Fulgoran

[tips-and-tricks-item-description]
paracelsin-briefing=[planet=paracelsin] to zamarznięta pustynia podobna do [planet=aquilo], ale w przeciwieństwie do świata amoniaku posiada stałą powierzchnię. Pod ziemią planeta skrywa rozległy ocean [fluid=nitrogen], który na powierzchni tworzy [tile=nitrogen-lake]. Planeta jest bogata w [item=sphalerite] i [item=tetrahedrite], związki [item=zinc], oraz [item=vaterite]. Na powierzchni można również znaleźć [entity=water-cryovolcano].
fulgoran-log=Wewnątrz [entity=crashed-fulgoran-pod], obok planów, znalazłeś wiadomość. Udało ci się ją przetłumaczyć dzięki badaniom przeprowadzonym na Fulgorze: „Pozdrowienia dla wszystkich form życia, które to znajdą. Jesteśmy Fulgoranami i wysłaliśmy te kapsuły na tę zamarzniętą pustynię w poszukiwaniu ropy. Nasze dążenie do rozwoju miało pewne niewielkie konsekwencje dla środowiska naszej planety, choć nie przejmujemy się tym, ale wyczerpało również większość naszych ukochanych zasobów ropy i zgromadziliśmy pewien zapas produktów ubocznych jej przetwarzania. Jeśli znasz miejsce, w którym jest ropa, skontaktuj się z naszą najbliższą planetarną placówką. Jeśli twoja planeta nie jest obecnie zdolna do podróży kosmicznych, prześlij tę wiadomość komuś, kto jest. A jeśli do tego czasu już nie będziemy żyli... Cóż, wątpię, żebyśmy mogli zawieść”. Ty i Fulgoranie bylibyście świetnymi przyjaciółmi.

