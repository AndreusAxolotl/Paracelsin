sphalerite-melting=Użyj [fluid=steam] i [fluid=nitric-acid] aby wspomóc nieefektywne topienie [item=sphalerite] w [fluid=molten-iron], bez pozostawiania produktów ubocznych.
tetrahedrite-melting=Użyj [fluid=steam] i [fluid=nitric-acid] aby wspomóc nieefektywne topienie [item=tetrahedrite] w [fluid=molten-copper], bez pozostawiania produktów ubocznych.
solar-matrix=Bardziej zaawansowany i wydajny panel słoneczny. Ogniwa słoneczne są poddawane działaniu [fluid=nitrogen]. Nadal jest to bezużyteczne na [planet=paracelsin] z powodu braku silnego światła słonecznego.
accumulator-v2=Bardziej zaawansowany akumulator. Baterie wykorzystują [fluid=nitric-acid].
elevated-pipe=Mocna konstrukcja nośna, która pozwala na umieszczenie rur wysoko nad ziemią.
vaterite-formation=Odtwarzając pierwotne właściwości [planet=paracelsin] w [entity=electrochemical-plant] możemy poddać [item=stone] działaniu [fluid=nitrogen] wykorzystując [item=vaterite] jako katalizator, aby uzyskać szansę na wytworzenie większej ilości.

