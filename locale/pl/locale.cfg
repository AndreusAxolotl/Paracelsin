[space-location-description]
paracelsin=Zamarznięte pustkowie o wysokiej aktywności kriowulkanicznej. Powierzchnię pokrywają jeziora [fluid=nitrogen] wypływające z podziemnego oceanu. [entity=water-cryovolcano] rozsiane są po powierzchni obok złóż [item=tetrahedrite] i [item=sphalerite], niezbędnych do wydobycia [item=zinc]. [item=vaterite] występuje również w niewielkich złożach. Wszystko, co zostanie zbudowane na tej planecie, musi być stale ogrzewane, w przeciwnym razie zamarznie, a wszystkie niepożądane produkty uboczne wydobycia cynku muszą zostać usunięte.

