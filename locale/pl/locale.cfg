[technology-description]
planet-discovery-paracelsin=Zamarznięte pustkowie o wysokiej aktywności kriowulkanicznej. Powierzchnię pokrywają jeziora [fluid=nitrogen] wypływające z podziemnego oceanu. [entity=water-cryovolcano] rozsiane są po powierzchni obok złóż [item=tetrahedrite] i [item=sphalerite], niezbędnych do wydobycia [item=zinc]. [item=vaterite] występuje również w niewielkich złożach. Wszystko, co zbudowano na tej planecie, musi być stale ogrzewane, w przeciwnym razie zamarznie, a wszystkie niepożądane produkty uboczne wydobycia cynku muszą zostać usunięte.
cryovolcanic-power=Wewnątrz zamarzniętej [entity=crashed-fulgoran-pod] znajdowały się starożytne plany specjalnego generatora elektrycznego, który wykorzystuje płynną wodę z [entity=water-cryovolcano] do wytwarzania energii elektrycznej, oraz niezwykle szybkiego, ale nieefektywnego [entity=burner-pumpjack]. Można je wykorzystać do uruchomienia zasilania na planecie.
nitric-acid-handling=Analizując spontaniczne reakcje chemiczne zachodzące na [entity=big-metallic-rock], możemy je odtworzyć w celu wytworzenia[fluid=nitric-acid].
sphalerite-processing=Przetwarzaj [item=sphalerite] na [fluid=zinc-concentrate], [item=iron-ore] i [item=sulfur].
tetrahedrite-processing=Przetwarzaj [item=tetrahedrite] na [fluid=zinc-concentrate], [item=copper-ore] i [item=sulfur].
zinc-extraction=Przetwarzaj [fluid=dirty-zinc-solution] na [item=zinc] za pomocą różnych procesów.
electrochemical-plant=Zakład wytwórczy wykorzystujący elektrochemię do przeprowadzania wszelkiego rodzaju procesów chemicznych.
mechanical-plant=Zakład wytwórczy wykorzystujący zaawansowane procesy mechaniczne do wytwarzania różnych przedmiotów.
galvanization-science-pack=Umożliwia badania wykraczające poza podstawowe zastosowania galwanizacji.
vaterite-processing-productivity=Zwiększona wydajność produkcji  [recipe=vaterite-processing].
zinc-piping=Solidniejsze i izolowane rury wykonane z [item=zinc-plate]. Nie zamarzają na zimnych powierzchniach, takich jak [planet=paracelsin] czy [planet=aquilo], i mogą transportować płyny pod ziemią na większe odległości.
axe-mining-speed=Dzięki cynkowaniu i naprawie kilofa można osiągnąć większą prędkość ręcznego wydobycia.
advanced-repair-device=Technologia nanorobotów, która pozwala na szybsze i trwalsze naprawy w porównaniu ze standardowym [item=repair-pack].
solar-matrix=Nawet jeśli energia słoneczna jest całkowicie bezużyteczna na [planet=paracelsin], dzięki technologii paracelsiańskiej można stworzyć nowe zastosowania energii słonecznej.
accumulator-v2=Bardziej wydajne akumulatory, które wykorzystują moc [item=supercapacitor] i [item=electric-coil] do magazynowania większej ilości energii.
elevated-pipe=Solidne konstrukcje nośne, które umożliwiają umieszczenie rur wysoko nad ziemią.
galvanized-steel=Nałożenie [item=zinc] na płytki [item=steel-plate] sprawia, że stają się one mocniejsze i odporne na korozję.
vaterite-formation=Ze względu na niedobór dużych złóż [item=vaterite] na planecie musimy zbadać sposób jego syntezy.
macerating=Zmodyfikowana konstrukcja kruszarki zdolna do rozdrobnienia dowolnego przedmiotu na pył.

