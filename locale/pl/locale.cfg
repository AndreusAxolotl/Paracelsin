[recipe-description]
nitric-acid-plastic=Wytworzenie plastiku z [fluid=nitric-acid] i innych materiałów.
nitric-acid-rocket-fuel=Wygodne wykorzystanie [fluid=nitric-acid].
solid-fuel-from-nitrogen=Wygodne wykorzystanie [fluid=nitrogen].
