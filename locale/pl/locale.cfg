burner-pumpjack=Nieoczekiwanie szybka pompa tłokowa zasilana paliwami palnymi o bardzo niskiej wydajności. Przydatna do uruchomienia baz na [planet=paracelsin]. Ponieważ jest spalinowa, nie zamarza.
zinc-pipe=Ocynkowany fragment rury. Nie zamarza na zimnych powierzchniach.
